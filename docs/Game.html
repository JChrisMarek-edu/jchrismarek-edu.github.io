  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" class="astro-vvvwv3sm"
    crossorigin="anonymous"></script>
  <script>
    const SIZE = 8;
    const GEM_TYPES = 5;

    let board = [];
    let firstSelection = null;
    let score = 0;
    let goal = 3000;
    let moves = 20;


    function createBoard() {
      board = [];
      for (let r = 0; r < SIZE; r++) {
        let row = [];
        for (let c = 0; c < SIZE; c++) {
          row.push(randomGem());
        }
        board.push(row);
      }
    }

    function randomGem() {
      return Math.floor(Math.random() * GEM_TYPES) + 1;
    }

    function renderBoard() {
      const boardDiv = document.getElementById("board");
      boardDiv.innerHTML = "";

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const tile = document.createElement("div");
          tile.className = `tile gem-${board[r][c]}`;
          tile.dataset.row = r;
          tile.dataset.col = c;

          tile.addEventListener("click", handleTileClick);

          boardDiv.appendChild(tile);
        }
      }
    }

    function handleTileClick(e) {
      const tile = e.target;
      const row = parseInt(tile.dataset.row);
      const col = parseInt(tile.dataset.col);

      if (!firstSelection) {
        firstSelection = { row, col, element: tile };
        tile.classList.add("selected");
        return;
      }

      const secondSelection = { row, col, element: tile };

      if (isAdjacent(firstSelection, secondSelection)) {
        swap(firstSelection, secondSelection);
        const matches = findMatches();

        if (matches.size === 0) {

          swap(firstSelection, secondSelection);
        } else {
          moves--;
          resolveBoard();
        }
      }

      firstSelection.element.classList.remove("selected");
      firstSelection = null;

      renderBoard();
    }

    function swap(a, b) {
      let temp = board[a.row][a.col];
      board[a.row][a.col] = board[b.row][b.col];
      board[b.row][b.col] = temp;
    }

    function isAdjacent(a, b) {
      return Math.abs(a.row - b.row) + Math.abs(a.col - b.col) === 1;
    }

    function findMatches() {
      const matches = new Set();


      for (let r = 0; r < SIZE; r++) {
        let streak = 1;

        for (let c = 1; c < SIZE; c++) {
          if (board[r][c] === board[r][c - 1]) {
            streak++;
          } else {
            if (streak >= 3) {
              for (let k = 0; k < streak; k++) {
                matches.add(`${r},${c - 1 - k}`);
              }
            }
            streak = 1;
          }
        }

        if (streak >= 3) {
          for (let k = 0; k < streak; k++) {
            matches.add(`${r},${SIZE - 1 - k}`);
          }
        }
      }


      for (let c = 0; c < SIZE; c++) {
        let streak = 1;
        for (let r = 1; r < SIZE; r++) {
          if (board[r][c] === board[r - 1][c]) {
            streak++;
          } else {
            if (streak >= 3) {
              for (let k = 0; k < streak; k++) {
                matches.add(`${r - 1 - k},${c}`);
              }
            }
            streak = 1;
          }
        }

        if (streak >= 3) {
          for (let k = 0; k < streak; k++) {
            matches.add(`${SIZE - 1 - k},${c}`);
          }
        }
      }

      return matches;
    }

    function clearMatches(matches) {
      matches.forEach(pos => {
        const [r, c] = pos.split(",").map(Number);
        board[r][c] = null;
      });
    }

    function applyGravity() {
      for (let c = 0; c < SIZE; c++) {
        let writeRow = SIZE - 1;

        for (let r = SIZE - 1; r >= 0; r--) {
          if (board[r][c] !== null) {
            board[writeRow][c] = board[r][c];
            if (writeRow !== r) {
              board[r][c] = null;
            }
            writeRow--;
          }
        }
      }
    }

    function refillBoard() {
      for (let c = 0; c < SIZE; c++) {
        for (let r = 0; r < SIZE; r++) {
          if (board[r][c] === null) {
            board[r][c] = randomGem();
          }
        }
      }
    }

    function updateScore(matches, cascades = 1) {
      let points = 0;

      points += matches.size * 10;
      if(matches.size > 3) points += 20;
      points *= cascades;

      return points;
    }

    function updateUI() {
      document.getElementById("score").textContent = score;
      document.getElementById("goal").textContent = goal;
      document.getElementById("moves").textContent = moves;
    }

    function resolveBoard() {
      let cascades = 1;
      let matches = findMatches();

      while (matches.size > 0) {
        score += updateScore(matches, cascades);
        updateUI(score);
        clearMatches(matches);
        applyGravity();
        refillBoard();
        cascades++;
        matches = findMatches();
      }
      if (score >= goal) {
        alert('You won! Thanks for playing!');
        restart();
      }
      if (moves <= 0) {
        alert('Thou hast lost!');
        restart();
      }
    }

    function restart() {
      createBoard();
      moves = 20;
      goal = 3000;
      score = 0;
      resolveBoard();
      score = 0;
      updateUI();
      renderBoard();
    }
    restartBtn.addEventListener("click", restart);

    restart();

  </script>
